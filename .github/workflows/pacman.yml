name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman graph
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: codestcode

          template: classic
          base: ""

          plugin_pacman: yes
          plugin_pacman_delay: 1
          plugin_pacman_speed: 2
          plugin_pacman_saturation: 0.8

          filename: pacman.svg
